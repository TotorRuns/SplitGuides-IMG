name: Build Package

on:
  push:
  pull_request:
  release:
    types: [published]

permissions: {}

jobs:
  build:
    name: Build Wheel
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"
    - name: Install pypa/build
      run: >-
        python3 -m
        pip install
        build
        --user
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: python-package-distributions
        path: dist/

  github-release:
    if: github.event_name == 'release'
    name: >-
      Sign the Python 🐍 distribution 📦 with Sigstore
      and upload to the GitHub Release
    needs:
    - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download the distribution packages
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: python-package-distributions
        path: dist/
    - name: Upload distributions to GitHub release
      env:
        GITHUB_TOKEN: ${{ github.token }}
        RELEASE_TAG: build-${{ github.sha }}
      shell: bash
      run: |
        if ! gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
          gh release create "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Build ${{ github.sha }}" \
            --notes "Automated build for commit ${{ github.sha }}." \
            --latest=false
        fi
        gh release upload "${RELEASE_TAG}" dist/* \
          --repo "${GITHUB_REPOSITORY}" \
          --clobber
